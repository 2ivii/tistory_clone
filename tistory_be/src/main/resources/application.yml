server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:tistory;MODE=MySQL;NON_KEYWORDS=VALUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true          # http://localhost:8080/h2-console
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop  # 개발용 (운영은 validate)
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  # MySQL 운영 설정 예시 (H2 블록 제거 후 사용)
  # datasource:
  #   url: jdbc:mysql://localhost:3306/tistory?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
  #   driver-class-name: com.mysql.cj.jdbc.Driver
  #   username: root
  #   password: yourpassword
  # jpa:
  #   properties:
  #     hibernate:
  #       dialect: org.hibernate.dialect.MySQL8Dialect

jwt:
  secret: tistory-clone-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256
  access-token-expiration: 3600000      # 1시간 (ms)
  refresh-token-expiration: 604800000   # 7일 (ms)

logging:
  level:
    com.tistory: DEBUG
    org.springframework.security: DEBUG
